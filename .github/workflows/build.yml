# 시옷앱 게이트웨이 — 멀티아치 도커 이미지 빌드 & GHCR 푸시 워크플로우.
#
# 이 워크플로우가 실행되면:
#   1. GHCR(GitHub Container Registry)에 로그인
#   2. QEMU + Buildx로 멀티아치(arm64 / armv7 / amd64) 이미지를 한 번에 빌드
#   3. ghcr.io/<owner>/siot-app:latest 및 버전 태그로 푸시
#
# HA에서 프리빌드 이미지를 쓰려면:
#   siot-app/config.yaml에 아래 줄을 추가한다(현재는 로컬 빌드 — 추가 전까지 Pi 온디바이스 빌드 유지):
#
#   image: ghcr.io/{owner}/siot-app-{arch}
#
#   ({arch}는 HA Supervisor가 aarch64/armv7/amd64 중 맞는 값으로 자동 치환)
#   이미지 경로는 본인 GitHub 사용자명(소문자)으로 <owner>를 교체 필요.

name: 시옷앱 멀티아치 빌드

on:
  push:
    branches:
      - main
    paths:
      # siot-app 하위 파일이 변경될 때만 실행(다른 파일 커밋에서는 불필요한 빌드 생략).
      - "siot-app/**"
  # 수동 실행: GitHub Actions 탭 → "Run workflow" 버튼으로 언제든 트리거 가능.
  workflow_dispatch:

env:
  # GHCR 이미지 이름. GitHub 사용자명(소문자)이 자동으로 들어간다.
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/siot-app

jobs:
  build-and-push:
    name: 멀티아치 빌드 & GHCR 푸시
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # GHCR 푸시에 packages: write 권한 필요.
      packages: write

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      # arm64/armv7 에뮬레이션을 위한 QEMU 설치.
      - name: QEMU 설치 (멀티아치 에뮬레이션)
        uses: docker/setup-qemu-action@v3

      # 멀티플랫폼 빌드를 지원하는 Buildx 드라이버 설정.
      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      # GITHUB_TOKEN은 Actions가 자동으로 주입한다 — 별도 시크릿 설정 불필요.
      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # config.yaml에서 버전 추출 (태그에 사용).
      - name: 버전 추출
        id: version
        run: |
          VERSION=$(grep '^version:' siot-app/config.yaml | sed 's/version: *"\(.*\)"/\1/')
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"

      # 멀티아치 빌드 & 푸시.
      # context: ./siot-app → Dockerfile이 있는 위치.
      # platforms: HA 애드온이 지원하는 세 아키텍처.
      - name: 멀티아치 이미지 빌드 & 푸시
        uses: docker/build-push-action@v6
        with:
          context: ./siot-app
          platforms: linux/arm64,linux/arm/v7,linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.value }}
          # 레이어 캐시를 GHCR에 저장해 다음 빌드를 빠르게.
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max
