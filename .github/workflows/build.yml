# 시옷앱 게이트웨이 — 멀티아치 도커 이미지 빌드 & GHCR 푸시 워크플로우.
# 실행 시: GHCR 로그인 → QEMU+Buildx로 arm64/amd64 빌드 → ghcr.io/<owner>/siot-app 로 푸시.
# HA에서 프리빌드 이미지를 쓰려면 siot-app/config.yaml에 `image: ghcr.io/<owner>/siot-app-{arch}` 추가.
# ※ name 값에 특수문자(&)가 있으면 따옴표로 감싼다(YAML 파싱 안전).

name: "시옷앱 멀티아치 빌드"

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/siot-app

jobs:
  build-and-push:
    name: "멀티아치 빌드 and GHCR 푸시"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: "소스 체크아웃"
        uses: actions/checkout@v4

      - name: "QEMU 설치 (멀티아치 에뮬레이션)"
        uses: docker/setup-qemu-action@v3

      - name: "Docker Buildx 설정"
        uses: docker/setup-buildx-action@v3

      - name: "GHCR 로그인"
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "버전 추출"
        id: version
        run: |
          VERSION=$(grep '^version:' siot-app/config.yaml | sed -E 's/version: *"(.*)"/\1/')
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: "멀티아치 이미지 빌드 푸시"
        uses: docker/build-push-action@v6
        with:
          context: ./siot-app
          # arm64=Pi4/5(권장), amd64=개발/테스트. armv7은 에뮬레이션 빌드가 느려 제외.
          platforms: linux/arm64,linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.value }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max
